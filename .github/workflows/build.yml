name: Build Ledora

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /mnt

      - name: Install buildah
        run: sudo apt-get install -y buildah

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          sudo mkdir -p /mnt/buildah-tmp
          sudo buildah --root /mnt/buildah-tmp/root --runroot /mnt/buildah-tmp/run build -f Containerfile -t ghcr.io/${{ github.repository_owner }}/ledora:latest .

      - name: Push image
        run: |
          sudo buildah --root /mnt/buildah-tmp/root --runroot /mnt/buildah-tmp/run push ghcr.io/${{ github.repository_owner }}/ledora:latest

  build-iso:
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /mnt

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/ledora:latest" >> $GITHUB_ENV

      - name: Build ISO
        run: |
          sudo mkdir -p /mnt/iso-output
          sudo docker run --rm \
            --privileged \
            --pull=always \
            -v /mnt/iso-output:/output \
            ghcr.io/osbuild/bootc-image-builder:latest \
            --type iso \
            $IMAGE

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledora-iso
          path: /mnt/iso-output/*.iso
          retention-days: 31
