name: Build Flux Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /mnt

      - name: Install buildah and cosign
        run: |
          sudo apt-get install -y buildah
          curl -Lo cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/cosign

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | buildah login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          sudo mkdir -p /mnt/buildah-tmp
          sudo buildah --root /mnt/buildah-tmp/root --runroot /mnt/buildah-tmp/run build -f Containerfile -t ghcr.io/${{ github.repository_owner }}/flux-linux:latest .

      - name: Push image
        run: |
          sudo buildah --root /mnt/buildah-tmp/root --runroot /mnt/buildah-tmp/run push ghcr.io/${{ github.repository_owner }}/flux-linux:latest

      - name: Sign image
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > /tmp/cosign.key
          cosign sign --key /tmp/cosign.key \
            --yes \
            ghcr.io/${{ github.repository_owner }}/flux-linux:latest
          rm /tmp/cosign.key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

  build-iso:
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /mnt

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/flux-linux:latest" >> $GITHUB_ENV

      - name: Build ISO
        run: |
          sudo mkdir -p /mnt/iso-output
          sudo mkdir -p /var/lib/containers/storage
          sudo docker run --rm \
            --privileged \
            --pull=always \
            -v /mnt/iso-output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            ghcr.io/osbuild/bootc-image-builder:latest \
            --type anaconda-iso \
            --config /dev/stdin \
            $IMAGE << 'EOF'
          {
            "blueprint": {
              "customizations": {
                "installer": {
                  "kickstart": {
                    "contents": "lang en_US.UTF-8\nkeyboard us\ntimezone UTC\nrootpw --lock\nuser --name=flux --groups=wheel\nautopart\nreboot"
                  }
                }
              }
            }
          }
          EOF

      - name: Upload ISO as artifact
