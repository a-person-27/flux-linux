name: Build Ledora

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
    - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune -af
          df -h    

      - name: Install buildah
        run: sudo apt-get install -y buildah

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          buildah build -f Containerfile -t ghcr.io/${{ github.repository_owner }}/ledora:latest .

      - name: Push image
        run: |
          buildah push ghcr.io/${{ github.repository_owner }}/ledora:latest
